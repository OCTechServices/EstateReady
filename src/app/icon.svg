<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#1A4A2E"/>
  <!-- Compass ring -->
  <circle cx="16" cy="16" r="11.5" fill="none" stroke="#B5935A" stroke-width="1.5"/>
  <!-- North needle — solid, pointing up -->
  <path d="M16,5 L20,16 L16,14 L12,16 Z" fill="#B5935A"/>
  <!-- South needle — hollow, pointing down -->
  <path d="M16,27 L20,16 L16,18 L12,16 Z" fill="none" stroke="#B5935A" stroke-width="1.25"/>
  <!-- Center pivot -->
  <circle cx="16" cy="16" r="1.75" fill="#1A4A2E" stroke="#B5935A" stroke-width="1"/>
</svg>
